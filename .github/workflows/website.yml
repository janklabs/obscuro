name: Website

on:
  push:
    paths:
      - "website/**"
      - ".github/workflows/website.yml"

jobs:
  check:
    name: Lint & Format
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: website
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          package_json_file: website/package.json

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: website/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile

      - run: pnpm lint

      - run: pnpm format:check

  deploy:
    name: Deploy to Cloudflare
    needs: check
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    defaults:
      run:
        working-directory: website
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          package_json_file: website/package.json

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: website/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile

      - uses: infisical/auth@v2
        id: infisical-auth
        with:
          domain: ${{ secrets.INFISICAL_API_URL }}
          identity-id: ${{ secrets.INFISICAL_IDENTITY_ID }}

      - uses: infisical/secrets@v2
        with:
          domain: ${{ secrets.INFISICAL_API_URL }}
          token: ${{ steps.infisical-auth.outputs.access-token }}
          project-slug: ${{ secrets.INFISICAL_PROJECT_SLUG }}
          env-slug: ci
          secret-path: /

      - run: pnpm deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
