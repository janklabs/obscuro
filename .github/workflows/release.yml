name: Release

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

permissions:
  contents: write

jobs:
  release:
    name: Semantic Release
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check for CLI changes
        id: check
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || git rev-list --max-parents=0 HEAD)
          CHANGES=$(git diff --name-only "$LAST_TAG"..HEAD -- . ':!website' ':!.github/workflows/website.yml')
          if [ -n "$CHANGES" ]; then
            echo "cli_changed=true" >> "$GITHUB_OUTPUT"
          fi
      - uses: go-semantic-release/action@v1
        if: steps.check.outputs.cli_changed == 'true'
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
